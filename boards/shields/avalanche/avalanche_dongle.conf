# Configuration for Avalanche Dongle

# Enable USB communication
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Avalanche Dongle"
CONFIG_USB_DEVICE_MANUFACTURER="Your Manufacturer"
CONFIG_USB_DEVICE_VID=0x1d50
CONFIG_USB_DEVICE_PID=0x614e

# Enable HID over USB
CONFIG_USB_HID_DEVICE=y

# Enable Bluetooth functionality
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_DEVICE_NAME="Avalanche Dongle"
CONFIG_BT_MAX_CONN=6
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y

# Enable split keyboard functionality
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_USB=y
CONFIG_ZMK_SPLIT_BLE=y

# Enable battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300

# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
