# Dongle configuration - no encoder, no display, no RGB hardware

# Disable display (dongle has no display)
CONFIG_ZMK_DISPLAY=n

# Disable encoder hardware (dongle has no physical encoder)
CONFIG_EC11=n

# Keep RGB enabled so dongle can forward rgb_ug commands to peripherals
# Disable only the physical LED strip (dongle has no LEDs)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=n

# Dongle connects to PC via USB only
CONFIG_ZMK_USB=y

# 2 peripherals (left + right) + 5 BT profiles = 7 connections needed
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
