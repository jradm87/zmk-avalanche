# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  # Dongle (central) - connects to PC via USB
  - board: nice_nano_v2
    shield: avalanche_dongle
  # Left (peripheral) - connects to dongle via BLE
  - board: nice_nano_v2
    shield: avalanche_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: avalanche_left_dongle
  # Right (peripheral) - connects to dongle via BLE
  - board: nice_nano_v2
    shield: avalanche_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: avalanche_right_dongle
  # Settings reset
  - board: nice_nano_v2
    shield: settings_reset
  # Legacy builds without dongle (left as central)
  - board: nice_nano_v2
    shield: avalanche_left
    artifact-name: avalanche_left_standalone
  - board: nice_nano_v2
    shield: avalanche_right
    artifact-name: avalanche_right_standalone
